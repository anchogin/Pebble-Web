services:
  pebble-web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - pebble-data:/data
    environment:
      - PEBBLE_PASSWORD=${PEBBLE_PASSWORD:?Set PEBBLE_PASSWORD in .env}
      - PEBBLE_JWT_SECRET=${PEBBLE_JWT_SECRET:?Set PEBBLE_JWT_SECRET in .env}
      - PEBBLE_DATA_DIR=/data
      - PEBBLE_PORT=8080
      - PEBBLE_SYNC_INTERVAL=300
    restart: unless-stopped

volumes:
  pebble-data:
