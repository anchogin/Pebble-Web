services:
  pebble-web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - pebble-data:/data
    environment:
      - PEBBLE_PASSWORD=your-password-here
      - PEBBLE_JWT_SECRET=your-random-secret-at-least-32-chars
      - PEBBLE_DATA_DIR=/data
      - PEBBLE_PORT=8080
      - PEBBLE_SYNC_INTERVAL=300
    restart: unless-stopped

volumes:
  pebble-data:
